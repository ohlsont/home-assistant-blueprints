name: Blockheat Mirror Sync

on:
  pull_request:
    paths:
      - "custom_components/blockheat/**"
      - "homeassistant/custom_components/blockheat/**"
      - "scripts/check_component_mirror_sync.py"
      - ".github/workflows/blockheat-mirror-sync.yml"
  push:
    branches:
      - main
    paths:
      - "custom_components/blockheat/**"
      - "homeassistant/custom_components/blockheat/**"
      - "scripts/check_component_mirror_sync.py"
      - ".github/workflows/blockheat-mirror-sync.yml"

jobs:
  mirror-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Check Blockheat mirror sync
        run: uv run python scripts/check_component_mirror_sync.py
