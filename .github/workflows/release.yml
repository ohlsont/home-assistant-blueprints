name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Validate release version
        run: |
          version="$(uv run python scripts/validate_release_version.py)"
          tag="v$version"
          if [ "$tag" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match code version $tag" >&2
            exit 1
          fi

      - name: Build HACS zip
        run: |
          cd custom_components/blockheat
          zip -r ../../blockheat.zip .

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          blockheat.zip
          --title "${{ github.ref_name }}"
          --generate-notes
