recompute:
  name: Recompute Blockheat
  description: Force an immediate policy/target recompute and write pass. When called with response enabled, returns snapshots keyed by config entry id.
  fields:
    entry_id:
      name: Config entry id
      description: Optional config entry id. If omitted all Blockheat entries are recomputed.
      example: "abcd1234"
      selector:
        text:
